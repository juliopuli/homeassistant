<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMA OS - Smart Home Environment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo-large">HOMA</div>
            <h2>ENVIRONMENT LOGIN</h2>
            <p>Accede a tu sistema operativo domótico mediante Home Assistant Auth Flow.</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="ha-url">Servidor Home Assistant</label>
                    <input type="text" id="ha-url" placeholder="https://..." value="https://julhomecala.priona.com"
                        required>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión Segura</button>
            </form>
        </div>
    </div>

    <!-- Main OS Application -->
    <div class="homa-app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">H</div>
                <div class="brand-text">HOMA OS</div>
            </div>

            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item active" data-view="home">
                        <i data-lucide="home"></i>
                        <span>Vista General</span>
                    </li>
                    <li class="nav-item" data-view="rooms">
                        <i data-lucide="grid-3x3"></i>
                        <span>Habitaciones</span>
                    </li>
                    <li class="nav-item" data-view="climate">
                        <i data-lucide="thermometer"></i>
                        <span>Climatización</span>
                    </li>
                    <li class="nav-item" data-view="energy">
                        <i data-lucide="zap"></i>
                        <span>Energía</span>
                    </li>
                    <li class="nav-item" data-view="media">
                        <i data-lucide="monitor-play"></i>
                        <span>Multimedia</span>
                    </li>
                    <li class="nav-item" data-view="security">
                        <i data-lucide="shield"></i>
                        <span>Seguridad</span>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div id="connection-dot" class="dot connecting"></div>
                    <span id="connection-text">Conectando...</span>
                </div>
                <button class="btn-icon" id="btn-logout" title="Cerrar sesión">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="top-info">
                    <h1 id="view-title">Vista General</h1>
                    <p class="subtitle" id="current-date">Cargando fecha...</p>
                </div>
                <div class="top-widgets">
                    <!-- Global weather/temperature widget -->
                    <div class="widget weather-widget" id="global-weather" style="display: none;">
                        <i data-lucide="cloud"></i>
                        <span id="global-temp">--°C</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div class="views-wrapper">

                <!-- 1. Home / Overview View -->
                <section id="view-home" class="view-section active">
                    <div class="home-alert-banner" id="home-alerts" style="display: none;">
                        <!-- Open doors, active alarms, etc. will go here -->
                    </div>
                    <div class="grid-layout overview-grid" id="home-summaries">
                        <!-- Dynamic summary cards (Lights On, Power usage, Climate status) -->
                        <div class="loading-state">
                            <span class="pulse"></span> Procesando entidades de tu hogar...
                        </div>
                    </div>
                </section>

                <!-- 2. Rooms View -->
                <section id="view-rooms" class="view-section">
                    <div class="grid-layout rooms-grid" id="rooms-container">
                        <!-- Rooms and all their mixed entities -->
                    </div>
                </section>

                <!-- 3. Climate View -->
                <section id="view-climate" class="view-section">
                    <div class="grid-layout" id="climate-container">
                        <!-- Thermostats and temperature/humidity sensors -->
                    </div>
                </section>

                <!-- 4. Energy View -->
                <section id="view-energy" class="view-section">
                    <div class="grid-layout" id="energy-container">
                        <!-- Power sensors, battery, wallbox -->
                    </div>
                </section>

                <!-- 5. Media View -->
                <section id="view-media" class="view-section">
                    <div class="grid-layout media-grid" id="media-container">
                        <!-- TVs, Speakers -->
                    </div>
                </section>

                <!-- 6. Security View -->
                <section id="view-security" class="view-section">
                    <div class="grid-layout" id="security-container">
                        <!-- Alarms, locks, door/window sensors, presence -->
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Templates for Dynamic Cards -->
    <template id="tpl-card-light">
        <div class="entity-card light-card">
            <div class="entity-info">
                <div class="entity-icon"><i data-lucide="lightbulb"></i></div>
                <div class="entity-text">
                    <div class="entity-name">Name</div>
                    <div class="entity-state">Apagado</div>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" class="light-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </template>

    <template id="tpl-card-sensor">
        <div class="entity-card sensor-card">
            <div class="entity-info">
                <div class="entity-icon"><i data-lucide="activity"></i></div>
                <div class="entity-text">
                    <div class="entity-name">Name</div>
                    <div class="entity-value"><span>--</span> <small>unit</small></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-card-media">
        <div class="entity-card media-card">
            <div class="media-artwork" style="display: none;"></div>
            <div class="media-content">
                <div class="entity-icon"><i data-lucide="tv"></i></div>
                <div class="entity-text">
                    <div class="entity-name">Name</div>
                    <div class="media-title">No hay reproducción</div>
                </div>
                <div class="media-controls">
                    <button class="btn-icon media-play-pause"><i data-lucide="power"></i></button>
                    <!-- Volume/App controls added dynamically -->
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="app.js"></script>
    <script>
        lucide.createIcons();

        // Simple date formatting
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        let dateStr = new Date().toLocaleDateString('es-ES', options);
        document.getElementById('current-date').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
    </script>
</body>

</html>
