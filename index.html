<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Casa Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #0d1f3c 0%, #050d1a 60%, #000 100%);
      overflow: hidden;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0.5)
      }

      50% {
        opacity: var(--op, .6);
        transform: scale(1)
      }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift var(--d, 8s) ease-in-out infinite alternate;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(99, 102, 241, .15);
      top: -10%;
      left: -5%;
      --d: 9s;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: rgba(16, 185, 129, .1);
      bottom: -5%;
      right: 5%;
      --d: 7s;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: rgba(251, 191, 36, .08);
      top: 40%;
      left: 55%;
      --d: 11s;
    }

    @keyframes drift {
      from {
        transform: translateY(0) translateX(0)
      }

      to {
        transform: translateY(30px) translateX(20px)
      }
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-card {
      background: rgba(255, 255, 255, .04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 28px;
      padding: 3.5rem 3rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .6);
      animation: slideUp .7s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .house-icon-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 1.8rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, .3), rgba(16, 185, 129, .2));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(99, 102, 241, .3);
      animation: pulse-house 3s ease-in-out infinite;
    }

    @keyframes pulse-house {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(99, 102, 241, .4), 0 0 30px rgba(99, 102, 241, .2)
      }

      50% {
        box-shadow: 0 0 0 12px rgba(99, 102, 241, 0), 0 0 50px rgba(99, 102, 241, .35)
      }
    }

    .house-icon-wrap svg {
      width: 44px;
      height: 44px;
    }

    .login-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: #f0f4ff;
      margin-bottom: .4rem;
      letter-spacing: -.02em;
    }

    .login-subtitle {
      font-size: .9rem;
      color: rgba(255, 255, 255, .4);
      margin-bottom: 2.5rem;
    }

    /* Feature chips */
    .features {
      display: flex;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .chip {
      font-size: .72rem;
      font-weight: 500;
      padding: .3rem .7rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .55);
    }

    .chip.green {
      background: rgba(16, 185, 129, .08);
      border-color: rgba(16, 185, 129, .2);
      color: #10b981;
    }

    .chip.purple {
      background: rgba(99, 102, 241, .08);
      border-color: rgba(99, 102, 241, .2);
      color: #a5b4fc;
    }

    .chip.amber {
      background: rgba(251, 191, 36, .08);
      border-color: rgba(251, 191, 36, .2);
      color: #fbbf24;
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .7rem;
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all .25s cubic-bezier(.16, 1, .3, 1);
      box-shadow: 0 4px 20px rgba(99, 102, 241, .4);
      letter-spacing: -.01em;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, .6);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login svg {
      width: 20px;
      height: 20px;
    }

    .security-note {
      margin-top: 1.5rem;
      padding: .9rem 1rem;
      background: rgba(16, 185, 129, .06);
      border: 1px solid rgba(16, 185, 129, .15);
      border-radius: 12px;
      font-size: .75rem;
      color: rgba(255, 255, 255, .45);
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      text-align: left;
    }

    .security-note svg {
      width: 16px;
      height: 16px;
      color: #10b981;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .login-footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: rgba(255, 255, 255, .18);
    }
  </style>
</head>

<body>
  <div class="login-bg">
    <div class="particles" id="particles"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
      <div class="login-card">

        <div class="house-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a5b4fc" />
                <stop offset="100%" stop-color="#34d399" />
              </linearGradient>
            </defs>
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" />
            <path d="M9 21V12h6v9" />
          </svg>
        </div>

        <h1 class="login-title">Mi Casa Inteligente</h1>
        <p class="login-subtitle">Control domótico · Home Assistant</p>

        <div class="features">
          <span class="chip green">🔒 OAuth 2.0 seguro</span>
          <span class="chip purple">⚡ Tiempo real</span>
          <span class="chip amber">🏠 Plano interactivo</span>
        </div>

        <button id="btn-login" class="btn-login">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          Entrar con Home Assistant
        </button>

        <div class="security-note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <span>Tus credenciales se introducen <strong>directamente en tu servidor Home Assistant</strong>. El dashboard
            nunca las ve ni las almacena.</span>
        </div>

        <p class="login-footer">Autenticación via OAuth 2.0 · sesión local en tu navegador</p>
      </div>
    </div>
  </div>

  <script>
    // ── Particles ──
    const container = document.getElementById('particles');
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.5;
      p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;--dur:${(Math.random() * 4 + 2).toFixed(1)}s;--op:${(Math.random() * .5 + .2).toFixed(2)};animation-delay:${(Math.random() * 5).toFixed(1)}s`;
      container.appendChild(p);
    }

    // ── OAuth 2.0 ──
    const HA_URL = 'https://julhomecala.priona.com';

    function getClientId() {
      // client_id = the URL of THIS application (without filename)
      const url = new URL(window.location.href);
      return url.origin + url.pathname.replace(/\/[^\/]*$/, '/');
    }

    function getRedirectUri() {
      const url = new URL(window.location.href);
      return url.origin + url.pathname.replace(/\/[^\/]*$/, '/') + 'dashboard.html';
    }

    document.getElementById('btn-login').addEventListener('click', () => {
      // Generate a random state value for CSRF protection
      const state = Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem('ha_oauth_state', state);

      const params = new URLSearchParams({
        response_type: 'code',
        client_id: getClientId(),
        redirect_uri: getRedirectUri(),
        state: state
      });

      window.location.href = `${HA_URL}/auth/authorize?${params}`;
    });

    // If already logged in, redirect to dashboard
    if (sessionStorage.getItem('ha_access_token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>

</html>
